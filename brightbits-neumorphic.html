<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BrightBits - Soft UI 🧸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #e0e5ec;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .title { font-size: 28px; font-weight: bold; color: #4a5568; margin-bottom: 5px; }
        .streak { background: #d1d9e6; padding: 8px 20px; border-radius: 25px; font-size: 16px; color: #5d6b7e; }
        
        .progress-bar { 
            width: 100%; max-width: 400px; height: 8px; 
            background: #d1d9e6; border-radius: 4px; margin-bottom: 25px; overflow: hidden;
        }
        .progress-fill { height: 100%; background: #5d6b7e; transition: width 0.3s; }
        
        .card-container { width: 100%; max-width: 400px; }
        
        /* Neumorphism Card */
        .flashcard {
            position: relative;
            width: 100%;
            height: 320px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #e0e5ec;
            box-shadow: 
                8px 8px 16px #c5ccd6,
                -8px -8px 16px #ffffff;
        }
        
        .flashcard.flipped {
            box-shadow: 
                inset 8px 8px 16px #c5ccd6,
                inset -8px -8px 16px #ffffff;
            background: #d1d9e6;
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        
        .card-front { background: #e0e5ec; }
        .card-back { 
            background: #d1d9e6;
            transform: rotateY(180deg);
        }
        
        .emoji { font-size: 80px; margin-bottom: 20px; }
        .word { font-size: 32px; font-weight: bold; color: #4a5568; margin-bottom: 10px; }
        .pronunciation { font-size: 18px; color: #718096; font-style: italic; margin-bottom: 15px; }
        .translation { font-size: 22px; color: #5d6b7e; font-weight: 500; }
        
        .nav-buttons {
            display: flex;
            gap: 25px;
            margin-top: 30px;
        }
        
        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: #e0e5ec;
            border: none;
            color: #5d6b7e;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 
                6px 6px 12px #c5ccd6,
                -6px -6px 12px #ffffff;
            transition: all 0.2s;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .nav-btn:not(:disabled):active {
            box-shadow: 
                inset 6px 6px 12px #c5ccd6,
                inset -6px -6px 12px #ffffff;
            color: #4a5568;
        }
        
        .dots {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            background: #d1d9e6;
            box-shadow: inset 2px 2px 4px #c5ccd6, inset -2px -2px 4px #ffffff;
        }
        
        .dot.active {
            background: #5d6b7e;
            width: 35px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">BrightBits</h1>
        <div class="streak" id="streak" style="display:none;">🔥 Streak: <span id="streak-count">0</span></div>
    </div>
    
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 20%"></div></div>
    
    <div class="card-container">
        <div class="flashcard" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="emoji" id="emoji">🐶</div>
                <div class="word" id="word">Dog</div>
                <div class="pronunciation" id="pronunciation">/dɔɡ/</div>
                <div class="translation" id="translation">Chó</div>
            </div>
            <div class="card-face card-back">
                <div class="emoji" id="emoji-back">🐕</div>
                <div class="word" id="word-back">Chó</div>
                <div class="translation" id="translation-back">Dog</div>
            </div>
        </div>
    </div>
    
    <div class="nav-buttons">
        <button class="nav-btn" id="prev" onclick="prevCard()" disabled>◀</button>
        <button class="nav-btn" id="next" onclick="nextCard()">▶</button>
    </div>
    
    <div class="dots" id="dots"></div>

    <script>
        const flashcards = [
            { emoji: '🐕', word: 'Dog', pronunciation: '/dɔɡ/', translation: 'Chó', image: '🐶' },
            { emoji: '🍎', word: 'Apple', pronunciation: '/ˈæp.əl/', translation: 'Táo', image: '🍎' },
            { emoji: '📖', word: 'Book', pronunciation: '/bʊk/', translation: 'Sách', image: '📚' },
            { emoji: '🌈', word: 'Rainbow', pronunciation: '/ˈreɪn.boʊ/', translation: 'Cầu vồng', image: '🌈' },
            { emoji: '🐈', word: 'Cat', pronunciation: '/kæt/', translation: 'Mèo', image: '🐱' },
        ];
        
        let currentIndex = 0;
        let flipped = false;
        let streak = 0;
        
        function updateCard() {
            const card = flashcards[currentIndex];
            document.getElementById('emoji').textContent = card.image;
            document.getElementById('emoji-back').textContent = card.emoji;
            document.getElementById('word').textContent = card.word;
            document.getElementById('word-back').textContent = card.translation;
            document.getElementById('pronunciation').textContent = card.pronunciation;
            document.getElementById('translation').textContent = card.translation;
            document.getElementById('translation-back').textContent = card.word;
            document.getElementById('card').className = 'flashcard' + (flipped ? ' flipped' : '');
            document.getElementById('prev').disabled = currentIndex === 0;
            document.getElementById('next').disabled = currentIndex === flashcards.length - 1;
            document.getElementById('progress').style.width = ((currentIndex + 1) / flashcards.length * 100) + '%';
            updateDots();
        }
        
        function flipCard() {
            if (navigator.vibrate) navigator.vibrate(30);
            flipped = !flipped;
            if (!flipped) {
                streak++;
                document.getElementById('streak').style.display = 'inline-block';
                document.getElementById('streak-count').textContent = streak;
            }
            updateCard();
        }
        
        function prevCard() {
            if (currentIndex > 0) {
                if (navigator.vibrate) navigator.vibrate(30);
                currentIndex--;
                flipped = false;
                updateCard();
            }
        }
        
        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                if (navigator.vibrate) navigator.vibrate(30);
                currentIndex++;
                flipped = false;
                updateCard();
            }
        }
        
        function updateDots() {
            const dots = document.getElementById('dots');
            dots.innerHTML = '';
            for (let i = 0; i < flashcards.length; i++) {
                dots.innerHTML += '<div class="dot' + (i === currentIndex ? ' active' : '') + '"></div>';
            }
        }
        
        updateCard();
    </script>
</body>
</html>
