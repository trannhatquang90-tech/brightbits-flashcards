<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BrightBits - Glass Cards 🌟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; color: white; }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .streak { background: rgba(255,255,255,0.3); padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        
        .progress-bar { 
            width: 100%; max-width: 400px; height: 6px; 
            background: rgba(255,255,255,0.3); border-radius: 3px; margin-bottom: 20px; overflow: hidden;
        }
        .progress-fill { height: 100%; background: white; transition: width 0.3s; }
        
        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 400px;
        }
        
        /* Glassmorphism Card */
        .flashcard {
            position: relative;
            width: 100%;
            height: 300px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .flashcard.flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
        }
        
        /* Glass Effect */
        .card-front {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .card-back {
            background: rgba(118, 75, 162, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: rotateY(180deg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }
        
        .emoji { font-size: 70px; margin-bottom: 20px; }
        .word { font-size: 28px; font-weight: bold; color: white; margin-bottom: 10px; }
        .pronunciation { font-size: 16px; color: rgba(255,255,255,0.8); font-style: italic; margin-bottom: 15px; }
        .translation { font-size: 20px; color: rgba(255,255,255,0.9); }
        
        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .nav-btn:not(:disabled):active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.5);
        }
        
        .dots {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
        }
        
        .dot.active {
            background: white;
            width: 30px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">BrightBits</h1>
        <div class="streak" id="streak" style="display:none;">🔥 Streak: <span id="streak-count">0</span></div>
    </div>
    
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 20%"></div></div>
    
    <div class="card-container">
        <div class="flashcard" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="emoji" id="emoji">🐶</div>
                <div class="word" id="word">Dog</div>
                <div class="pronunciation" id="pronunciation">/dɔɡ/</div>
                <div class="translation" id="translation">Chó</div>
            </div>
            <div class="card-face card-back">
                <div class="emoji" id="emoji-back">🐕</div>
                <div class="word" id="word-back">Chó</div>
                <div class="translation" id="translation-back">Dog</div>
            </div>
        </div>
    </div>
    
    <div class="nav-buttons">
        <button class="nav-btn" id="prev" onclick="prevCard()" disabled>◀</button>
        <button class="nav-btn" id="next" onclick="nextCard()">▶</button>
    </div>
    
    <div class="dots" id="dots"></div>

    <script>
        const flashcards = [
            { emoji: '🐕', word: 'Dog', pronunciation: '/dɔɡ/', translation: 'Chó', image: '🐶' },
            { emoji: '🍎', word: 'Apple', pronunciation: '/ˈæp.əl/', translation: 'Táo', image: '🍎' },
            { emoji: '📖', word: 'Book', pronunciation: '/bʊk/', translation: 'Sách', image: '📚' },
            { emoji: '🌈', word: 'Rainbow', pronunciation: '/ˈreɪn.boʊ/', translation: 'Cầu vồng', image: '🌈' },
            { emoji: '🐈', word: 'Cat', pronunciation: '/kæt/', translation: 'Mèo', image: '🐱' },
        ];
        
        let currentIndex = 0;
        let flipped = false;
        let streak = 0;
        
        function updateCard() {
            const card = flashcards[currentIndex];
            document.getElementById('emoji').textContent = card.image;
            document.getElementById('emoji-back').textContent = card.emoji;
            document.getElementById('word').textContent = card.word;
            document.getElementById('word-back').textContent = card.translation;
            document.getElementById('pronunciation').textContent = card.pronunciation;
            document.getElementById('translation').textContent = card.translation;
            document.getElementById('translation-back').textContent = card.word;
            document.getElementById('card').className = 'flashcard' + (flipped ? ' flipped' : '');
            document.getElementById('prev').disabled = currentIndex === 0;
            document.getElementById('next').disabled = currentIndex === flashcards.length - 1;
            document.getElementById('progress').style.width = ((currentIndex + 1) / flashcards.length * 100) + '%';
            updateDots();
        }
        
        function flipCard() {
            if (navigator.vibrate) navigator.vibrate(30);
            flipped = !flipped;
            if (!flipped) {
                streak++;
                document.getElementById('streak').style.display = 'inline-block';
                document.getElementById('streak-count').textContent = streak;
            }
            updateCard();
        }
        
        function prevCard() {
            if (currentIndex > 0) {
                if (navigator.vibrate) navigator.vibrate(30);
                currentIndex--;
                flipped = false;
                updateCard();
            }
        }
        
        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                if (navigator.vibrate) navigator.vibrate(30);
                currentIndex++;
                flipped = false;
                updateCard();
            }
        }
        
        function updateDots() {
            const dots = document.getElementById('dots');
            dots.innerHTML = '';
            for (let i = 0; i < flashcards.length; i++) {
                dots.innerHTML += '<div class="dot' + (i === currentIndex ? ' active' : '') + '"></div>';
            }
        }
        
        updateCard();
    </script>
</body>
</html>
