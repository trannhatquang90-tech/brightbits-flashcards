<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightBits Kids - Animal Flashcards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .title { font-size: 28px; font-weight: bold; color: #4a5568; margin-bottom: 10px; }
        .card-wrapper { position: relative; width: 100%; max-width: 500px; margin-bottom: 30px; }
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 72px; height: 72px; border-radius: 50%;
            background: white; border: none; font-size: 32px; cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2); z-index: 10;
        }
        .nav-btn.left { left: 5px; }
        .nav-btn.right { right: 5px; }
        .flashcard {
            width: 100%; padding-bottom: 140%;
            border-radius: 30px; overflow: hidden;
            background: #ddd; position: relative; cursor: pointer;
        }
        .word { 
            font-size: 36px; font-weight: bold; color: #2d3748; 
            text-align: center; margin-bottom: 20px;
        }
        .progress { display: flex; gap: 10px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; background: white; }
        .dot.active { background: #ff6b6b; width: 24px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">BrightBits Kids 🐾</h1>
    </div>
    
    <div class="card-wrapper">
        <button class="nav-btn left" onclick="prevCard()">◀</button>
        <button class="nav-btn right" onclick="nextCard()">▶</button>
        <div class="flashcard" id="card" onclick="speak()">
            <div style="position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center" id="bg"></div>
        </div>
    </div>
    
    <div class="word" id="word">Dog</div>
    
    <div class="progress" id="dots"></div>

    <script>
        const cards = [
            { word: 'Dog', translation: 'Chó', img: '🐶' },
            { word: 'Cat', translation: 'Mèo', img: '🐱' },
            { word: 'Elephant', translation: 'Voi', img: '🐘' },
            { word: 'Lion', translation: 'Sư Tử', img: '🦁' },
            { word: 'Rabbit', translation: 'Thỏ', img: '🐰' },
        ];
        
        let current = 0;
        
        function updateCard() {
            document.getElementById('word').textContent = cards[current].word;
            document.getElementById('bg').style.backgroundImage = 'url(https://placehold.co/500x500/a8edea/4a5568?text=' + cards[current].img + ')';
            updateDots();
        }
        
        function prevCard() { current = current <= 0 ? cards.length - 1 : current - 1; updateCard(); }
        function nextCard() { current = current >= cards.length - 1 ? 0 : current + 1; updateCard(); }
        
        function speak() {
            const text = cards[current].word;
            if ('speechSynthesis' in window) {
                speechSynthesis.speak(new SpeechSynthesisUtterance(text));
            }
        }
        
        function updateDots() {
            document.getElementById('dots').innerHTML = cards.map((_, i) => 
                `<div class="dot${i === current ? ' active' : ''}"></div>`
            ).join('');
        }
        
        updateCard();
    </script>
</body>
</html>
